name: ci

on:
  pull_request:
  push:
    branches: [main]

jobs:
  gates:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: make test
      - run: make build
        env:
          VITE_API_BASE_URL: ${{ vars.VITE_API_BASE_URL || 'https://wydokyegph.execute-api.eu-central-1.amazonaws.com' }}
          VITE_SSE_BASE_URL: ${{ vars.VITE_SSE_BASE_URL || 'https://vpjjdvoeej5izlqy3nnpllmyua0idsrp.lambda-url.eu-central-1.on.aws' }}
